              hosts: https://10.48.8.203:9200,https://10.48.8.204:9200,https://10.48.8.205:9200 # 127.0.0.1:9200 for rest mode
              properties:
                mode: rest # or rest
                security.auth: elastic:-2IZZXnyhi6IRqev+Z71 #  only used for rest mode
                security.cert: cert/http_ca_prod.crt
                cluster.name: elasticsearch
    - instance: ykz_uc_admin_sys_unitinfo # canal instance Name or mq topic name
