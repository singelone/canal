canal.conf:
  mode: kafka #tcp kafka rocketMQ rabbitMQ
  flatMessage: false
  zookeeperHosts:
  syncBatchSize: 1000
  retries: -1
  timeout:
  accessKey:
  secretKey:
  consumerProperties:
    # canal tcp consumer
    canal.tcp.server.host: 127.0.0.1:11111
    canal.tcp.zookeeper.hosts:
    canal.tcp.batch.size: 500
    canal.tcp.username:
    canal.tcp.password:
    # kafka consumer
    kafka.bootstrap.servers: 172.18.11.12:9092
    kafka.enable.auto.commit: false
    kafka.auto.commit.interval.ms: 1000
    kafka.auto.offset.reset: latest
    kafka.request.timeout.ms: 40000
    kafka.session.timeout.ms: 30000
    kafka.isolation.level: read_committed
    kafka.max.poll.records: 1000
    # rocketMQ consumer
    rocketmq.namespace:
    rocketmq.namesrv.addr: 127.0.0.1:9876
    rocketmq.batch.size: 1000
    rocketmq.enable.message.trace: false
    rocketmq.customized.trace.topic:
    rocketmq.access.channel:
    rocketmq.subscribe.filter:
    # rabbitMQ consumer
    rabbitmq.host:
    rabbitmq.virtual.host:
    rabbitmq.username:
    rabbitmq.password:
    rabbitmq.resource.ownerId:

  srcDataSources:
    defaultDS:
      url: jdbc:mysql://172.18.11.7:3306/ykz-uc-admin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8
      username: canal
      password: canal
  canalAdapters:
  - instance: ykz-uc-admin_sys_unituser # canal instance Name or mq topic name
    groups:
    - groupId: g2
      outerAdapters:
      - name: logger
      - name: es8
        hosts: https://172.18.11.219:9200 # 127.0.0.1:9200 for rest mode
        properties:
          mode: rest # or rest
          security.auth: elastic:yoTka4TCA+dX*2X82aMH #  only used for rest mode
          security.cert: cert/http_ca_dev.crt
          cluster.name: elasticsearch
  - instance: ykz-uc-admin_sys_unitinfo # canal instance Name or mq topic name
    groups:
      - groupId: g3
        outerAdapters:
          - name: logger
          - name: es8
            hosts: https://172.18.11.219:9200 # 127.0.0.1:9200 for rest mode
            properties:
              mode: rest # or rest
              security.auth: elastic:yoTka4TCA+dX*2X82aMH #  only used for rest mode
              security.cert: cert/http_ca_dev.crt
              cluster.name: elasticsearch
      - groupId: g5
        outerAdapters:
          - name: logger
          - name: es8
            hosts: https://172.18.11.219:9200 # 127.0.0.1:9200 for rest mode
            properties:
              mode: rest # or rest
              security.auth: elastic:yoTka4TCA+dX*2X82aMH #  only used for rest mode
              security.cert: cert/http_ca_dev.crt
              cluster.name: elasticsearch
  - instance: ykz-uc-admin_sys_userinfo # canal instance Name or mq topic name
    groups:
      - groupId: g4
        outerAdapters:
          - name: logger
          - name: es8
            hosts: https://172.18.11.219:9200 # 127.0.0.1:9200 for rest mode
            properties:
              mode: rest # or rest
              security.auth: elastic:yoTka4TCA+dX*2X82aMH #  only used for rest mode
              security.cert: cert/http_ca_dev.crt
              cluster.name: elasticsearch

